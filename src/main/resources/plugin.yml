name: SLfeatures
version: '${version}'
main: skylands.online.slfeatures.SLfeatures
api-version: '26.2'
load: POSTWORLD
softdepend: [blockcommand]

commands:
  scale:
    description: Change player model scale size
    usage: /scale <size>
  lock:
    description: Lock item from copying by other players
    usage: /lock
  unlock:
    description: Unlock copy protection of an item
    usage: /unlock
  serverutils:
    description: Reload Server Utils configuration
    usage: /serverutils reload
    aliases: [slfeatures, sutils]
  recipecreator:
    description: Open in-game recipe creator GUI
    usage: /recipecreator <name>
    aliases: [rc, customcraft]

